tnc: "By completing this registration, you are acknowledging that all the information entered is accurate and true. Falsifying information may result in cancellation of your membership.  The OAFC reserves the right to change a member status as it sees fit.

      To be eligible for an Active Membership with the OAFC, you must hold a position as a Chief, Assistant Chief, Deputy Chief, Assistant Deputy Chief, Platoon Chief, Battalion Chief, District Chief, and Division Chief or Directors of any fire department in the Province of Ontario, providing such individual does not hold active membership in any association of union that represents firefighters in collective bargaining matters.

      Associate membership with the OAFC shall be all those who do not fit in the Active Member category however their contributions to the Fire Service would be considered beneficial to the Corporation.

      OAFC Industry Members are reserved for companies that provide equipment and services to the fire service."
